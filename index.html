<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta http-equiv="refresh" content="0;url=es/">
  <title>Opus Ludus</title>
  <script>
    (function () {
      var lang = (navigator.language || "en").split("-")[0];
      if (lang === "es") {
        window.location.replace("es/");
      } else {
        window.location.replace("en/");
      }
    })();
  </script>
</head>
<body>
  <p>Redirecting to <a href="es/">Opus Ludus</a>...</p>
</body>
</html>
